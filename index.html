<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Days</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 평소 무드: 소프트 블러쉬 & 딥 로즈 포인트 */
        :root {
            --bg-gradient: linear-gradient(135deg, #F8EDEF 0%, #EFE1E4 100%);
            
            /* 한층 더 리얼해진 유리 질감 반투명 배경 */
            --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.15) 100%);
            --card-border-top: rgba(255, 255, 255, 0.9);
            --card-border-left: rgba(255, 255, 255, 0.6);
            /* 외부 그림자와 내부 빛 반사 효과 추가 */
            --shadow: 0 30px 50px rgba(170, 130, 140, 0.25), inset 0 0 0 1px rgba(255, 255, 255, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.5);
            
            --text-main: #4A3B3C; 
            --text-sub: #9E8489; 
            
            /* 포인트 컬러: 딥 로즈 */
            --accent-color: #B85C6A; 
            --accent-light: #D6949E;
            
            --font-serif: 'Cormorant Garamond', serif; 
            --font-sans: 'Poppins', sans-serif; 
        }

        /* 스페셜 데이 무드: 다크 로즈 */
        body.special-day {
            --bg-gradient: linear-gradient(135deg, #2A1C1F 0%, #1A1214 100%);
            --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            --card-border-top: rgba(255, 255, 255, 0.2);
            --card-border-left: rgba(255, 255, 255, 0.1);
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            
            --text-main: #FDF5F5; 
            --text-sub: #B5959A;
            
            --accent-color: #E28F9B; 
            --accent-light: #5A353B;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            transition: background 1.5s ease-in-out, color 1.5s ease-in-out; 
        }

        /* 반응형 유리 질감 카드 */
        .card {
            width: 88%;
            max-width: 340px;
            box-sizing: border-box;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid var(--card-border-top);
            border-left: 1px solid var(--card-border-left);
            border-radius: 35px;
            padding: 55px 30px;
            text-align: center;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 1.5s ease;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .title {
            font-family: var(--font-sans);
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        /* 포인트 하트 이모지 */
        .heart-icon {
            color: var(--accent-light);
            font-size: 0.8rem;
        }

        /* 포인트 컬러가 적용된 D-Day 숫자 */
        .d-day-number {
            font-family: var(--font-serif);
            font-weight: 400;
            font-size: 7.5rem;
            line-height: 1; 
            margin: 0;
            letter-spacing: -0.02em;
            color: var(--accent-color);
            transition: font-size 0.3s ease;
        }

        /* 사귄 날짜 간격 늘림 */
        .since-date {
            font-family: var(--font-sans);
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-top: 18px; /* 디데이 숫자와의 간격 추가 */
            margin-bottom: 40px;
        }

        /* 고급스러운 장식 기호 (구분선 대체) */
        .separator {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 40px;
            opacity: 0.7;
        }

        /* 🎵 가사 텍스트 (줄바꿈 및 양쪽 밸런스 보정) */
        .message-box {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
            font-size: 1.25rem;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0 auto 45px;
            width: 100%;
            max-width: 250px; /* 글씨가 옆으로 너무 퍼지지 않게 제한 */
            text-wrap: balance; /* 글씨를 중앙 기준으로 예쁘게 줄바꿈하는 마법의 CSS */
            word-break: keep-all; 
            transition: font-size 0.3s ease;
        }

        /* 새로운 가시성 최적화 다음 기념일 박스 */
        .upcoming-container {
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: all 1.5s ease;
        }

        body.special-day .upcoming-container {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .up-label {
            font-family: var(--font-sans);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .up-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .up-name {
            font-family: var(--font-sans);
            font-weight: 500;
            color: var(--text-main);
            font-size: 1rem;
        }

        .up-dday {
            font-family: var(--font-sans);
            background: var(--accent-color);
            color: #FFF;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .up-date {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: 300;
        }

        /* 반응형 최적화 */
        @media (max-width: 480px) {
            .card { width: 85%; padding: 45px 25px; }
            .d-day-number { font-size: 6.5rem; }
            .message-box { font-size: 1.15rem; margin-bottom: 35px; }
            .up-name { font-size: 0.95rem; }
            .up-dday { font-size: 0.7rem; padding: 4px 10px; }
        }

        @media (max-width: 360px) {
            .card { padding: 40px 20px; }
            .d-day-number { font-size: 5.5rem; }
            .message-box { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="title" id="top-title">Our Days</span>
            <span class="heart-icon">🤍</span>
        </div>
        
        <div class="d-day-number" id="days-count">0</div>
        <div class="since-date">since 26.06.14</div>
        
        <div class="separator">❦</div>

        <div class="message-box" id="daily-message"></div>

        <div id="upcoming-event"></div>
    </div>

    <script>
        // 1. D-Day Calculation
        const kstFormatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul' }); 
        const todayKstStr = kstFormatter.format(new Date()); 
        const kstToday = new Date(`${todayKstStr}T00:00:00`); 

        const kstStart = new Date("2026-06-14T00:00:00"); 
        
        const timeDiff = kstToday.getTime() - kstStart.getTime();
        const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24)) + 1; 

        document.getElementById("days-count").innerText = daysDiff;

        // 2. Upcoming Events
        function getNextAnnualDate(month, day) {
            let currentYear = kstToday.getFullYear();
            let targetDate = new Date(`${currentYear}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00`);
            
            if (targetDate < kstToday) {
                targetDate = new Date(`${currentYear + 1}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00`);
            }
            return targetDate;
        }

        let upcomingEvents = [];
        upcomingEvents.push({ name: "GF Birthday", date: getNextAnnualDate(10, 21) });
        upcomingEvents.push({ name: "BF Birthday", date: getNextAnnualDate(11, 15) });
        upcomingEvents.push({ name: "Christmas", date: getNextAnnualDate(12, 25) });
        upcomingEvents.push({ name: "Anniversary", date: getNextAnnualDate(6, 14) });

        for (let day = 100; day <= 10000; day += 100) {
            if (daysDiff <= day) {
                let d = new Date(kstStart.getTime() + (day - 1) * 24 * 60 * 60 * 1000);
                upcomingEvents.push({ name: `${day} Days`, date: d });
            }
        }

        upcomingEvents.sort((a, b) => a.date.getTime() - b.date.getTime());

        const todayEvents = upcomingEvents.filter(e => e.date.getTime() === kstToday.getTime());
        if (todayEvents.length > 0) {
            document.body.classList.add('special-day');
            
            let todayName = todayEvents[0].name.toLowerCase();
            if (todayName === "anniversary") document.getElementById("top-title").innerText = "Happy Anniversary";
            else if (todayName === "christmas") document.getElementById("top-title").innerText = "Merry Christmas";
            else if (todayName.includes("birthday")) document.getElementById("top-title").innerText = "Happy Birthday";
            else if (todayName.includes("days")) document.getElementById("top-title").innerText = `Happy ${todayEvents[0].name}`;
            else document.getElementById("top-title").innerText = "Special Day";
        }

        let futureEvent = upcomingEvents.find(e => e.date.getTime() > kstToday.getTime());
        if (futureEvent) {
            let diffTime = futureEvent.date.getTime() - kstToday.getTime();
            let diffDays = Math.ceil(diffTime / (1000 * 3600 * 24));
            
            let eventMonth = String(futureEvent.date.getMonth() + 1).padStart(2, '0');
            let eventDay = String(futureEvent.date.getDate()).padStart(2, '0');
            
            document.getElementById("upcoming-event").innerHTML = `
                <div class="upcoming-container">
                    <div class="up-label">Next Event</div>
                    <div class="up-main">
                        <span class="up-name">${futureEvent.name}</span>
                        <span class="up-dday">D-${diffDays}</span>
                    </div>
                    <div class="up-date">${eventMonth}.${eventDay}</div>
                </div>
            `;
        }

        // 3. 100 Pop Song Lyrics
        const lyrics = [
            "You are the best thing, that's ever been mine.",

            "I've loved you for a thousand years.",
            "You're my golden hour, the color of my sky.",

            "I just called to say I love you.",

        ];

        const dayIndex = daysDiff % lyrics.length;
        document.getElementById("daily-message").innerText = `"${lyrics[dayIndex]}"`;
    </script>

</body>
</html>
