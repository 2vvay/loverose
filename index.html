<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Days</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 🌸 소프트 블러쉬 핑크 & 핀터레스트 무드 */
        :root {
            --bg-gradient: linear-gradient(135deg, #FFF0F3 0%, #FFE5EC 100%);
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 40px rgba(255, 182, 193, 0.3);
            
            --text-main: #5A464C; /* 따뜻한 다크 브라운/그레이 */
            --text-sub: #9D8C8F;
            --accent-color: #FF8E9E; /* 하트, 포인트 컬러 */
            --line-color: #F0D8DB;
            --tag-bg: rgba(255, 142, 158, 0.1);
            
            --font-serif: 'Cormorant Garamond', serif; 
            --font-sans: 'Poppins', sans-serif; 
        }

        /* 🌟 스페셜 데이 다크 로즈 무드 */
        body.special-day {
            --bg-gradient: linear-gradient(135deg, #2D1E22 0%, #1A1012 100%);
            --card-bg: rgba(45, 30, 34, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            
            --text-main: #F4E3E6; 
            --text-sub: #A38C91;
            --accent-color: #FFB3C1; 
            --line-color: #4A3338;
            --tag-bg: rgba(255, 179, 193, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            transition: background 1.5s ease, color 1.5s ease; 
        }

        /* 유리 질감 반투명 카드 (Glassmorphism) */
        .card {
            width: 85%;
            max-width: 340px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 50px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s ease forwards;
            transition: all 1.5s ease;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .title {
            font-family: var(--font-sans);
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        /* 통통 튀는 미니 하트 */
        .heart {
            color: var(--accent-color);
            font-size: 0.8rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .d-day-number {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 6.5rem;
            line-height: 1;
            margin: 0 0 30px 0;
            letter-spacing: -0.02em;
        }

        .message-box {
            position: relative;
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
            font-size: 1.3rem;
            color: var(--text-main);
            padding-top: 30px;
            margin-bottom: 30px;
        }

        .message-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background-color: var(--line-color);
            transition: background-color 1s ease;
        }

        /* 핀터레스트 스타일 알약 태그 */
        .upcoming-tag {
            display: inline-block;
            background: var(--tag-bg);
            color: var(--accent-color);
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 1s ease;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="title" id="top-title">Together</span>
            <span class="heart">❤</span>
        </div>
        
        <div class="d-day-number" id="days-count">0</div>
        
        <div class="message-box" id="daily-message"></div>

        <div class="upcoming-tag" id="upcoming-event"></div>
    </div>

    <script>
        // 1. D-Day Calculation (Seoul Timezone)
        const startDate = new Date("2026-06-14T00:00:00+09:00"); 
        
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const kstTime = new Date(utc + (9 * 60 * 60 * 1000));
        kstTime.setHours(0,0,0,0);

        const timeDiff = kstTime.getTime() - startDate.getTime();
        const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24)) + 1; 

        document.getElementById("days-count").innerText = daysDiff;

        // 2. Upcoming Events & Special Day Logic
        function getNextAnnualDate(month, day) {
            let currentYear = kstTime.getFullYear();
            let d = new Date(`${currentYear}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00+09:00`);
            if (d < kstTime) {
                d = new Date(`${currentYear + 1}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00+09:00`);
            }
            return d;
        }

        let upcomingEvents = [];
        upcomingEvents.push({ name: "my birthday", date: getNextAnnualDate(10, 21) });
        upcomingEvents.push({ name: "his birthday", date: getNextAnnualDate(11, 15) });
        upcomingEvents.push({ name: "christmas", date: getNextAnnualDate(12, 25) });
        upcomingEvents.push({ name: "anniversary", date: getNextAnnualDate(6, 14) });

        const milestoneDays = [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000];
        milestoneDays.forEach(day => {
            if (daysDiff <= day) {
                let d = new Date(startDate.getTime() + (day - 1) * 24 * 60 * 60 * 1000);
                upcomingEvents.push({ name: `${day} days`, date: d });
            }
        });

        upcomingEvents.sort((a, b) => a.date.getTime() - b.date.getTime());

        const todayEvents = upcomingEvents.filter(e => e.date.getTime() === kstTime.getTime());
        if (todayEvents.length > 0) {
            document.body.classList.add('special-day');
            
            let todayName = todayEvents[0].name;
            if (todayName === "anniversary") document.getElementById("top-title").innerText = "Happy Anniversary";
            else if (todayName === "christmas") document.getElementById("top-title").innerText = "Merry Christmas";
            else if (todayName.includes("birthday")) document.getElementById("top-title").innerText = "Happy Birthday";
            else document.getElementById("top-title").innerText = "Special Day";
        }

        let futureEvent = upcomingEvents.find(e => e.date.getTime() > kstTime.getTime());
        if (futureEvent) {
            let diffTime = futureEvent.date.getTime() - kstTime.getTime();
            let diffDays = Math.ceil(diffTime / (1000 * 3600 * 24));
            document.getElementById("upcoming-event").innerText = `next : ${futureEvent.name} (d-${diffDays})`;
        }

        // 3. Random Messages
        const messages = [
            "always you.", "my favorite distraction.", "rent free in my head.", "just us.", "lucky me.",
            "you're kinda my thing.", "pov: you.", "pure serotonin.", "my favorite notification.", "lowkey obsessed.",
            "10/10.", "green flag.", "soft spot.", "my safe place.", "matching my energy.",
            "no context, just you.", "big fan of you.", "top tier.", "unreal.", "my go-to.",
            "you win.", "better together.", "24/7.", "favorite person.", "you > anything.",
            "comfort zone.", "my standard.", "stuck with me.", "exactly what i needed.", "makes sense.",
            "definitely you.", "right on time.", "magnetic.", "nothing but you.", "you make it easy.",
            "worth it.", "highlight of my day.", "can't get enough.", "peace of mind.", "my favorite habit.",
            "only you.", "simply the best.", "right where i belong.", "everything and more.", "couldn't ask for better.",
            "main character energy.", "living in my mind.", "always.", "just my type.", "mine."
        ];

        const randomIndex = Math.floor(Math.random() * messages.length);
        document.getElementById("daily-message").innerText = messages[randomIndex];
    </script>

</body>
</html>
