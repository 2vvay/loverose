<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Days</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 🎀 평소 무드: 소프트 블러쉬 & 우아한 딥 로즈 포인트 */
        :root {
            --bg-gradient: linear-gradient(135deg, #F8EDEF 0%, #EFE1E4 100%);
            
            /* 💎 더 맑고 투명한 유리 질감 */
            --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.05) 100%);
            --card-border-top: rgba(255, 255, 255, 0.9);
            --card-border-left: rgba(255, 255, 255, 0.6);
            
            /* 💎 빛 반사와 깊은 그림자로 리얼리티 극대화 */
            --shadow: 
                0 40px 80px rgba(170, 130, 140, 0.35), 
                inset 0 2px 8px rgba(255, 255, 255, 0.6), 
                inset 0 -2px 10px rgba(255, 255, 255, 0.1);
            
            --text-main: #4A3B3C; 
            --text-sub: #9E8489; 
            
            --accent-color: #B85C6A; 
            --accent-light: #D6949E;
            
            --font-serif: 'Cormorant Garamond', serif; 
            --font-sans: 'Poppins', sans-serif; 
        }

        /* 🍷 스페셜 데이 무드: 다크 로즈 */
        body.special-day {
            --bg-gradient: linear-gradient(135deg, #2A1C1F 0%, #1A1214 100%);
            --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.02) 100%);
            --card-border-top: rgba(255, 255, 255, 0.25);
            --card-border-left: rgba(255, 255, 255, 0.15);
            --shadow: 
                0 40px 80px rgba(0, 0, 0, 0.6), 
                inset 0 2px 8px rgba(255, 255, 255, 0.1);
            
            --text-main: #FDF5F5; 
            --text-sub: #B5959A;
            
            --accent-color: #E28F9B; 
            --accent-light: #5A353B;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            transition: background 1.5s ease-in-out, color 1.5s ease-in-out; 
        }

        /* ✨ 한층 더 유리같은 카드 디자인 */
        .card {
            width: 88%;
            max-width: 340px;
            box-sizing: border-box;
            background: var(--card-bg);
            backdrop-filter: blur(40px); /* 블러를 극대화하여 영롱하게 */
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid var(--card-border-top);
            border-left: 1px solid var(--card-border-left);
            border-radius: 35px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 1.5s ease;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .title {
            font-family: var(--font-sans);
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        .heart-icon {
            color: var(--accent-light);
            font-size: 0.8rem;
        }

        .d-day-number {
            font-family: var(--font-serif);
            font-weight: 400;
            font-size: 7.5rem;
            line-height: 1; 
            margin: 0;
            letter-spacing: -0.02em;
            color: var(--accent-color);
        }

        /* 띄어쓰기 및 마진 조절 완료 */
        .since-date {
            font-family: var(--font-sans);
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-top: 35px; /* 줄바꿈 효과를 위해 간격 넉넉히 확보 */
            margin-bottom: 40px;
        }

        .separator {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 40px;
            opacity: 0.7;
        }

        /* 🎵 의미에 맞게 줄바꿈된 가사 박스 */
        .message-box {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
            font-size: 1.2rem;
            color: var(--text-main);
            line-height: 1.7; /* 줄간격을 넓혀 더 우아하게 */
            margin: 0 auto 45px;
            width: 100%;
            max-width: 270px; 
            transition: font-size 0.3s ease;
        }

        /* 🗓️ 유리 캡슐 느낌을 더 살린 기념일 박스 */
        .upcoming-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            box-shadow: 0 10px 25px rgba(170, 130, 140, 0.1);
        }

        body.special-day .upcoming-container {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .up-label {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .up-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .up-name {
            font-family: var(--font-sans);
            font-weight: 500;
            color: var(--text-main);
            font-size: 1.05rem;
        }

        .up-dday {
            font-family: var(--font-sans);
            background: var(--accent-color);
            color: #FFF;
            padding: 5px 14px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 10px rgba(184, 92, 106, 0.3); /* 버튼에도 살짝 빛이 나게 */
        }

        .up-date {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 300;
        }

        @media (max-width: 480px) {
            .card { width: 85%; padding: 50px 25px; }
            .d-day-number { font-size: 6.5rem; }
            .since-date { margin-top: 25px; margin-bottom: 35px; }
            .message-box { font-size: 1.15rem; margin-bottom: 35px; }
            .up-name { font-size: 1rem; }
            .up-dday { font-size: 0.7rem; padding: 4px 12px; }
        }

        @media (max-width: 360px) {
            .card { padding: 40px 20px; }
            .d-day-number { font-size: 5.5rem; }
            .message-box { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="title" id="top-title">Our Days</span>
            <span class="heart-icon">🤍</span>
        </div>
        
        <div class="d-day-number" id="days-count">0</div>
        <!-- 줄바꿈 및 마진 조절 완료 -->
        <div class="since-date">since 26.06.14</div>
        
        <div class="separator">❦</div>

        <!-- HTML 삽입을 위해 innerHTML을 사용할 영역 -->
        <div class="message-box" id="daily-message"></div>

        <div id="upcoming-event"></div>
    </div>

    <script>
        // 1. D-Day Calculation
        const kstFormatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul' }); 
        const todayKstStr = kstFormatter.format(new Date()); 
        const kstToday = new Date(`${todayKstStr}T00:00:00`); 

        const kstStart = new Date("2026-06-14T00:00:00"); 
        
        const timeDiff = kstToday.getTime() - kstStart.getTime();
        const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24)) + 1; 

        document.getElementById("days-count").innerText = daysDiff;

        // 2. Upcoming Events
        function getNextAnnualDate(month, day) {
            let currentYear = kstToday.getFullYear();
            let targetDate = new Date(`${currentYear}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00`);
            
            if (targetDate < kstToday) {
                targetDate = new Date(`${currentYear + 1}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00`);
            }
            return targetDate;
        }

        let upcomingEvents = [];
        upcomingEvents.push({ name: "GF Birthday", date: getNextAnnualDate(10, 21) });
        upcomingEvents.push({ name: "BF Birthday", date: getNextAnnualDate(11, 15) });
        upcomingEvents.push({ name: "Christmas", date: getNextAnnualDate(12, 25) });
        upcomingEvents.push({ name: "Anniversary", date: getNextAnnualDate(6, 14) });

        for (let day = 100; day <= 10000; day += 100) {
            if (daysDiff <= day) {
                let d = new Date(kstStart.getTime() + (day - 1) * 24 * 60 * 60 * 1000);
                upcomingEvents.push({ name: `${day} Days`, date: d });
            }
        }

        upcomingEvents.sort((a, b) => a.date.getTime() - b.date.getTime());

        const todayEvents = upcomingEvents.filter(e => e.date.getTime() === kstToday.getTime());
        if (todayEvents.length > 0) {
            document.body.classList.add('special-day');
            
            let todayName = todayEvents[0].name.toLowerCase();
            if (todayName === "anniversary") document.getElementById("top-title").innerText = "Happy Anniversary";
            else if (todayName === "christmas") document.getElementById("top-title").innerText = "Merry Christmas";
            else if (todayName.includes("birthday")) document.getElementById("top-title").innerText = "Happy Birthday";
            else if (todayName.includes("days")) document.getElementById("top-title").innerText = `Happy ${todayEvents[0].name}`;
            else document.getElementById("top-title").innerText = "Special Day";
        }

        let futureEvent = upcomingEvents.find(e => e.date.getTime() > kstToday.getTime());
        if (futureEvent) {
            let diffTime = futureEvent.date.getTime() - kstToday.getTime();
            let diffDays = Math.ceil(diffTime / (1000 * 3600 * 24));
            
            let eventMonth = String(futureEvent.date.getMonth() + 1).padStart(2, '0');
            let eventDay = String(futureEvent.date.getDate()).padStart(2, '0');
            
            // NEXT ANNIVERSARY 문구 반영
            document.getElementById("upcoming-event").innerHTML = `
                <div class="upcoming-container">
                    <div class="up-label">NEXT ANNIVERSARY</div>
                    <div class="up-main">
                        <span class="up-name">${futureEvent.name}</span>
                        <span class="up-dday">D-${diffDays}</span>
                    </div>
                    <div class="up-date">${eventMonth}.${eventDay}</div>
                </div>
            `;
        }

        // 3. 의미를 고려하여 <br>이 포함된 노래 가사 배열
        const lyrics = [
            "You are the best thing,<br>that's ever been mine.",

            "My heart's been borrowed<br>and yours has been blue.",

            "You're the only thing I know<br>like the back of my hand.",
            "I cross my heart and promise<br>to give all I've got to give.",
            "And I will always<br>love you.",
            "If I ain't got you,<br>I got nothing.",

            "I love you perfectly,<br>you make me whole.",

            "When you smile,<br>the whole world stops and stares.",

            "You are the best thing<br>I never knew I needed.",
            "You're my sunshine<br>in the rain.",
            "I just want<br>to be yours.",
            "I wanna be<br>yours.",
            "I belong with you,<br>you belong with me.",
            "You're my<br>sweetheart.",
            "You make it better,<br>just by being here.",
            "You're everything<br>I ever wanted.",
            "I fall for you more and more<br>every day.",

            "I have and I always<br>will love you.",

            "I love you<br>unconditionally.",
            "You're my dream<br>come true.",
            "You're the piece of me<br>that makes me whole.",
            "I just called<br>to say I love you.",
            "I want to<br>hold your hand.",
            "I love you<br>like a love song, baby.",
            "There's no one else<br>I'd rather be with.",
            "You've got the love I need<br>to see me through.",
            "You are the apple<br>of my eye.",
            "I'll love you<br>till the sky falls down.",
            "I could die a happy man<br>with you.",
            "You're the reason<br>I believe in love.",
            "It's always<br>been you."
        ];

        // 의미상 끊긴 줄바꿈이 반영되도록 innerHTML 사용
        const dayIndex = daysDiff % lyrics.length;
        document.getElementById("daily-message").innerHTML = `"${lyrics[dayIndex]}"`;
    </script>

</body>
</html>
