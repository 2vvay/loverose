<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Days</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 평소 무드: 소프트 블러쉬 & 더스티 로즈 */
        :root {
            --bg-gradient: linear-gradient(135deg, #FDF7F8 0%, #F3E6E8 100%);
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.8);
            --shadow: 0 20px 40px rgba(186, 150, 155, 0.15);
            
            --text-main: #4A3B3C; 
            --text-sub: #9E8489; 
            --text-accent: #7A6366;
            
            --line-color: #EBDCE0;
            --tag-bg: transparent;
            
            --font-serif: 'Cormorant Garamond', serif; 
            --font-sans: 'Poppins', sans-serif; 
        }

        /* 기념일 무드: 딥 와인 & 다크 로즈 */
        body.special-day {
            --bg-gradient: linear-gradient(135deg, #2A1C1F 0%, #1A1214 100%);
            --card-bg: rgba(42, 28, 31, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            
            --text-main: #FDF5F5; 
            --text-sub: #B5959A;
            --text-accent: #D4BFC3;
            
            --line-color: #4A3237;
            --tag-bg: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            transition: background 1.5s ease-in-out, color 1.5s ease-in-out; 
        }

        /* 반투명 유리 질감 카드 */
        .card {
            width: 85%;
            max-width: 320px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 55px 30px;
            text-align: center;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 1.5s ease;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 25px;
        }

        .title {
            font-family: var(--font-sans);
            font-weight: 400;
            font-size: 0.7rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-sub);
            transition: color 1.5s ease;
        }

        .d-day-number {
            font-family: var(--font-serif);
            font-weight: 300;
            font-size: 7.5rem;
            line-height: 1;
            margin: 0 0 5px 0;
            letter-spacing: -0.02em;
            transition: font-size 0.3s ease;
        }

        .since-date {
            font-family: var(--font-sans);
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 35px;
        }

        .separator {
            font-family: var(--font-serif);
            font-size: 0.9rem;
            color: var(--line-color);
            margin-bottom: 35px;
            letter-spacing: 0.3em;
            transition: color 1.5s ease;
        }

        .message-box {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
            font-size: 1.2rem;
            color: var(--text-accent);
            line-height: 1.5;
            margin-bottom: 45px;
            padding: 0 10px;
            word-break: keep-all;
            transition: font-size 0.3s ease, color 1.5s ease;
        }

        .upcoming-tag {
            display: inline-block;
            border: 1px solid var(--line-color);
            background: var(--tag-bg);
            color: var(--text-sub);
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 1.5s ease;
        }

        @media (max-width: 480px) {
            .card { width: 80%; padding: 45px 25px; }
            .d-day-number { font-size: 6rem; }
            .since-date { margin-bottom: 30px; }
            .message-box { font-size: 1.1rem; margin-bottom: 35px; }
            .upcoming-tag { font-size: 0.6rem; padding: 7px 18px; }
        }

        @media (max-width: 360px) {
            .d-day-number { font-size: 5rem; }
            .message-box { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="title" id="top-title">Our Days</span>
        </div>
        
        <div class="d-day-number" id="days-count">0</div>
        <div class="since-date">since 26.06.14</div>
        
        <div class="separator">✦ ✦ ✦</div>

        <div class="message-box" id="daily-message"></div>

        <div class="upcoming-tag" id="upcoming-event"></div>
    </div>

    <script>
        // 1. D-Day Calculation (해외 접속 시에도 완벽하게 한국 자정 기준으로 고정)
        const kstFormatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul' }); 
        const todayKstStr = kstFormatter.format(new Date()); // YYYY-MM-DD 형식 추출
        const kstToday = new Date(`${todayKstStr}T00:00:00`); // 한국 시간 기준 오늘 자정

        const kstStart = new Date("2026-06-14T00:00:00"); // 시작일 자정
        
        const timeDiff = kstToday.getTime() - kstStart.getTime();
        const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24)) + 1; 

        document.getElementById("days-count").innerText = daysDiff;

        // 2. Upcoming Events & Special Day Logic
        function getNextAnnualDate(month, day) {
            let currentYear = kstToday.getFullYear();
            let targetDate = new Date(`${currentYear}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00`);
            
            if (targetDate < kstToday) {
                targetDate = new Date(`${currentYear + 1}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00`);
            }
            return targetDate;
        }

        let upcomingEvents = [];
        upcomingEvents.push({ name: "GF birthday", date: getNextAnnualDate(10, 21) });
        upcomingEvents.push({ name: "BF birthday", date: getNextAnnualDate(11, 15) });
        upcomingEvents.push({ name: "Christmas", date: getNextAnnualDate(12, 25) });
        upcomingEvents.push({ name: "Anniversary", date: getNextAnnualDate(6, 14) });

        // 100일부터 10000일(약 27년)까지 100일 단위로 자동 계산
        for (let day = 100; day <= 10000; day += 100) {
            if (daysDiff <= day) {
                let d = new Date(kstStart.getTime() + (day - 1) * 24 * 60 * 60 * 1000);
                upcomingEvents.push({ name: `${day} days`, date: d });
            }
        }

        upcomingEvents.sort((a, b) => a.date.getTime() - b.date.getTime());

        // 오늘이 특별한 날인지 확인
        const todayEvents = upcomingEvents.filter(e => e.date.getTime() === kstToday.getTime());
        if (todayEvents.length > 0) {
            document.body.classList.add('special-day');
            
            let todayName = todayEvents[0].name.toLowerCase();
            if (todayName === "anniversary") document.getElementById("top-title").innerText = "Happy Anniversary";
            else if (todayName === "christmas") document.getElementById("top-title").innerText = "Merry Christmas";
            else if (todayName.includes("birthday")) document.getElementById("top-title").innerText = "Happy Birthday";
            else if (todayName.includes("days")) document.getElementById("top-title").innerText = `Happy ${todayEvents[0].name}`;
            else document.getElementById("top-title").innerText = "Special Day";
        }

        // 다가오는 다음 기념일 표시
        let futureEvent = upcomingEvents.find(e => e.date.getTime() > kstToday.getTime());
        if (futureEvent) {
            let diffTime = futureEvent.date.getTime() - kstToday.getTime();
            let diffDays = Math.ceil(diffTime / (1000 * 3600 * 24));
            
            let eventMonth = String(futureEvent.date.getMonth() + 1).padStart(2, '0');
            let eventDay = String(futureEvent.date.getDate()).padStart(2, '0');
            
            document.getElementById("upcoming-event").innerText = `next : ${eventMonth}.${eventDay} ${futureEvent.name} (d-${diffDays})`;
        }

        // 3. 100 Pop Song Lyrics (Romantic & Aesthetic)
        const lyrics = [

            "You're my dream come true.",
            "You're the piece of me that makes me whole.",
            "I just called to say I love you.",
            "I want to hold your hand.",
            "I love you like a love song, baby.",
            "There's no one else I'd rather be with.",
            "You've got the love I need to see me through.",

            "I'll love you till the sky falls down.",
            "I could die a happy man with you.",
            "You're the reason I believe in love.",
            "It's always been you."
        ];

        // 하루에 한 번씩만 가사가 순환되도록 (디데이 기준)
        const dayIndex = daysDiff % lyrics.length;
        document.getElementById("daily-message").innerText = `"${lyrics[dayIndex]}"`;
    </script>

</body>
</html>
